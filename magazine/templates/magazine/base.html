<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ISFDB Explorer{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 600; letter-spacing: .03em; }
    .toc-table th { white-space: nowrap; cursor: pointer; user-select: none; }
    .toc-table th:hover { background-color: #e2e6ea; }
    .toc-table td { vertical-align: top; }
    .badge-type { font-size: .75em; }
    footer { font-size: .85em; }
    /* Fallback in case Bootstrap CSS is unavailable */
    .collapse { display: none; }
    .collapse.show { display: block; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">📚 ISFDB Explorer</a>
    <div class="d-flex gap-3">
      <a class="nav-link text-white" href="/">Browse Issues</a>
      <a class="nav-link text-white" href="/author/">Author Search</a>
    </div>
  </div>
</nav>

<main class="container mb-5">
  {% block content %}{% endblock %}
</main>

<footer class="text-center text-muted py-3 border-top">
  Data from <a href="https://www.isfdb.org" target="_blank" rel="noopener">isfdb.org</a>
  &mdash; local database copy
</footer>

<script>
(function () {
  function cellText(row, col) {
    var c = row.cells[col];
    return c ? c.textContent.trim() : '';
  }

  function applySort(table, col, asc) {
    var tbody = table.tBodies[0];
    if (!tbody) return;
    var rows = Array.from(tbody.rows);
    var numeric = rows.some(function (r) {
      var t = cellText(r, col);
      return t !== '' && /^\d+$/.test(t);
    });
    rows.sort(function (a, b) {
      var ta = cellText(a, col), tb = cellText(b, col);
      if (numeric) {
        var na = ta === '' ? Infinity : parseInt(ta, 10);
        var nb = tb === '' ? Infinity : parseInt(tb, 10);
        return asc ? na - nb : nb - na;
      }
      ta = ta.toLowerCase(); tb = tb.toLowerCase();
      return asc ? ta.localeCompare(tb) : tb.localeCompare(ta);
    });
    rows.forEach(function (r) { tbody.appendChild(r); });
  }

  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('table.toc-table').forEach(function (table) {
      var ths = Array.from(table.querySelectorAll('thead th'));
      var activeCol = null, activeAsc = true;
      ths.forEach(function (th, i) {
        th.dataset.label = th.textContent.trim();
        th.title = 'Click to sort';
        th.addEventListener('click', function () {
          var asc = (activeCol === i) ? !activeAsc : true;
          activeCol = i; activeAsc = asc;
          ths.forEach(function (h) { h.textContent = h.dataset.label; });
          th.textContent = th.dataset.label + (asc ? ' ▲' : ' ▼');
          applySort(table, i, asc);
        });
      });
      // Show initial sort indicator on first column without re-sorting
      if (ths.length > 0) {
        activeCol = 0; activeAsc = true;
        ths[0].textContent = ths[0].dataset.label + ' ▲';
      }
    });
  });
})();
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
